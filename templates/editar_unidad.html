<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Editar Unidad</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f9;
            padding: 20px;
        }
        h2 {
            margin-bottom: 10px;
        }
        form {
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            max-width: 900px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }
        label {
            font-weight: bold;
            font-size: 14px;
        }
        input, select {
            padding: 6px;
            width: 100%;
        }
        button {
            margin-top: 15px;
            padding: 10px 20px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background: #0056b3;
        }
    </style>
</head>
<body>

<h2>🛠️ Editar Unidad</h2>

<form method="POST" action="{{ url_for('editar_unidad', unidad_id=unidad.unidad_id) }}">
    <div class="grid">
        <div>
            <label>Unidad ID</label>
            <input type="text" name="unidad_id" value="{{ unidad.unidad_id }}" required> <!-- El campo ya no es readonly -->
        </div>
        <div>
            <label>Placas Unidad</label>
            <input type="text" name="placas_unidad" value="{{ unidad.placas_unidad }}" required>
        </div>
        <div>
            <label>Operador</label>
            <input type="text" name="operador" value="{{ unidad.operador }}" required>
        </div>
        <div>
            <label>Licencia</label>
            <input type="text" name="licencia" value="{{ unidad.licencia }}" required>
        </div>
    </div>

    <!-- Cajas -->
    <div class="seccion grid">
        <div>
            <label>Caja 1</label>
            <input type="text" name="caja1" value="{{ unidad.caja1 }}" required>
        </div>
        <div>
            <label>Placas Caja 1</label>
            <input type="text" name="placas_caja1" value="{{ unidad.placas_caja1 }}" required>
        </div>
        <div>
            <label>Caja 2</label>
            <input type="text" name="caja2" value="{{ unidad.caja2 }}" required>
        </div>
        <div>
            <label>Placas Caja 2</label>
            <input type="text" name="placas_caja2" value="{{ unidad.placas_caja2 }}" required>
        </div>
        <div>
            <label>Dolly</label>
            <input type="text" name="dolly" value="{{ unidad.dolly }}" required>
        </div>
    </div>

    <!-- Coordinador -->
    <div class="seccion">
        <label>Coordinador</label>
        <select name="coordinador" required>
            <option value="Ximena" {% if unidad.coordinador == 'Ximena' %}selected{% endif %}>Ximena</option>
            <option value="Julio" {% if unidad.coordinador == 'Julio' %}selected{% endif %}>Julio</option>
            <option value="Alejandra" {% if unidad.coordinador == 'Alejandra' %}selected{% endif %}>Alejandra</option>
        </select>
    </div>

    <button type="submit">Guardar Cambios</button>
</form>


</body>
</html>
